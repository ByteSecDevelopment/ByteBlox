name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained false .\Bloxstrap\Bloxstrap.csproj

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ByteBlox
        path: .\Bloxstrap\bin\Release\net8.0-windows\win-x64\publish\ByteBlox.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ByteBlox
          path: release

      - name: Rename binaries
        run: mv release/ByteBlox.exe ByteBlox.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ByteBlox.exe
          name: ByteBlox ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ByteBlox
          path: release

      - name: Rename binaries
        run: mv release/ByteBlox.exe ByteBlox.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ByteBlox.exe
          name: ByteBlox ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
